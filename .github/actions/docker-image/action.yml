name: Docker Image
description: Build and push a devcontainer image, resolving the correct tag for PRs vs main.

inputs:
  platform:
    description: Platform name used as the image tag suffix and devcontainer directory (e.g. linux, android, wasm).
    required: true
  token:
    description: GitHub token for GHCR authentication.
    required: true

outputs:
  image:
    description: The fully-qualified image reference to use in downstream jobs.
    value: ${{ steps.resolve.outputs.image }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: detect-changes
      id: filter
      uses: dorny/paths-filter@v3
      with:
        token: ""
        filters: |
          changed:
            - '.devcontainer/${{ inputs.platform }}/Dockerfile'

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: check-image-exists
      id: image
      shell: bash
      run: |
        if docker manifest inspect ghcr.io/${{ github.repository }}:${{ inputs.platform }} > /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: resolve-image
      id: resolve
      shell: bash
      env:
        REPO: ghcr.io/${{ github.repository }}
        PLATFORM: ${{ inputs.platform }}
      run: |
        if [[ "${{ steps.filter.outputs.changed }}" != "true" && "${{ steps.image.outputs.exists }}" != "false" ]]; then
          echo "image=${REPO}:${PLATFORM}" >> $GITHUB_OUTPUT
          echo "need-build=false" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "image=${REPO}:${PLATFORM}" >> $GITHUB_OUTPUT
          echo "need-build=true" >> $GITHUB_OUTPUT
          {
            echo "tags<<EOF"
            echo "${REPO}:${PLATFORM}"
            echo "${REPO}:${PLATFORM}-${{ github.sha }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        else
          echo "image=${REPO}:${PLATFORM}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "need-build=true" >> $GITHUB_OUTPUT
          echo "tags=${REPO}:${PLATFORM}-${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

    - uses: docker/build-push-action@v6
      if: steps.resolve.outputs.need-build == 'true'
      with:
        context: .devcontainer/${{ inputs.platform }}
        push: true
        tags: ${{ steps.resolve.outputs.tags }}

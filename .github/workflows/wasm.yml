name: wasm

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect-changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ""
          filters: |
            changed:
              - '.devcontainer/wasm/Dockerfile'

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: check-image-exists
        id: image
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository }}:wasm > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v6
        if: steps.filter.outputs.changed == 'true' || steps.image.outputs.exists == 'false'
        with:
          context: .devcontainer/wasm
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:wasm

  build:
    runs-on: ubuntu-24.04
    needs: docker

    strategy:
      matrix:
        include:
          - preset: wasm32-emscripten-release
            target: install

    container:
      image: ghcr.io/${{ github.repository }}:wasm
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: cmake-build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-${{ matrix.target }}
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --target ${{ matrix.target }}

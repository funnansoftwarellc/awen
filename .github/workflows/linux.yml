name: linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.resolve.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect-changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ""
          filters: |
            changed:
              - '.devcontainer/linux/Dockerfile'

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: check-image-exists
        id: image
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository }}:linux > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: resolve-image
        id: resolve
        env:
          REPO: ghcr.io/${{ github.repository }}
        run: |
          if [[ "${{ steps.filter.outputs.changed }}" != "true" && "${{ steps.image.outputs.exists }}" != "false" ]]; then
            echo "image=${REPO}:linux" >> $GITHUB_OUTPUT
            echo "need-build=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image=${REPO}:linux" >> $GITHUB_OUTPUT
            echo "need-build=true" >> $GITHUB_OUTPUT
            {
              echo "tags<<EOF"
              echo "${REPO}:linux"
              echo "${REPO}:linux-${{ github.sha }}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "image=${REPO}:linux-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "need-build=true" >> $GITHUB_OUTPUT
            echo "tags=${REPO}:linux-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v6
        if: steps.resolve.outputs.need-build == 'true'
        with:
          context: .devcontainer/linux
          push: true
          tags: ${{ steps.resolve.outputs.tags }}

  lint:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        target:
          - clang-format-check
          - clang-tidy-diff

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset x64-linux-clang-debug

      - name: ${{ matrix.target }}
        shell: bash
        run: cmake --build --preset x64-linux-clang-debug --target ${{ matrix.target }}

  build:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        preset:
          - x64-linux-gcc-release
          - x64-linux-clang-debug

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: cmake-build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-test
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-install
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --target install

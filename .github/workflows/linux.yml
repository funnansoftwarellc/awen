name: linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image: ${{ steps.docker-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/docker-image
        id: docker-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        target:
          - clang-format-check
          - clang-tidy-diff

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset x64-linux-clang-debug

      - name: cmake-build
        shell: bash
        run: cmake --build --preset x64-linux-clang-debug

      - name: ${{ matrix.target }}
        shell: bash
        run: cmake --build --preset x64-linux-clang-debug --target ${{ matrix.target }}

  build:
    runs-on: ubuntu-24.04
    needs: docker
    strategy:
      matrix:
        preset:
          - x64-linux-gcc-release
          - x64-linux-clang-debug

    container:
      image: ${{ needs.docker.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/get-vcpkg

      - name: cmake-configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: cmake-build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-test
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --parallel $(( $(nproc --all) + 1 ))

      - name: cmake-install
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --target install

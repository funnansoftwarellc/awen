<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Awen | Pong</title>
    <style>
        :root {
            /* Sampled from the Awen banner */
            --deep: #0b0a10;
            --shadow: #1a1226;
            --purple: #2e1f3d;
            --bark: #3a2a1e;
            --amber: #d4a84b;
            --gold: #ecc36f;
            --mist: #8db8c4;
            --fog: #5e8f9a;
            --light: #f0e6d0;
            --danger: #e05252;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--light);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--deep) url("banner.png") no-repeat center top / cover fixed;
        }

        /* Dark vignette overlay so the content stays readable */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 120% 90% at 50% 20%, transparent 30%, rgba(11, 10, 16, 0.70) 70%),
                linear-gradient(180deg, rgba(11, 10, 16, 0.25) 0%, rgba(11, 10, 16, 0.85) 100%);
        }

        .awen-app {
            position: relative;
            z-index: 1;
            width: min(1200px, 100%);
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .awen-topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 16px;
            border: 1px solid rgba(212, 168, 75, 0.25);
            border-radius: 14px;
            background: linear-gradient(110deg, rgba(26, 18, 38, 0.82), rgba(11, 10, 16, 0.88));
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .awen-title {
            margin: 0;
            font-family: "Cinzel", "Times New Roman", serif;
            font-size: clamp(1.3rem, 2.7vw, 2rem);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .awen-subtitle {
            margin: 2px 0 0;
            color: var(--mist);
            font-size: 0.92rem;
            letter-spacing: 0.03em;
        }

        .awen-status {
            min-height: 1.2rem;
            font-size: 0.9rem;
            color: var(--fog);
        }

        .awen-stage {
            position: relative;
            border: 1px solid rgba(212, 168, 75, 0.18);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(11, 10, 16, 0.55);
            box-shadow:
                0 0 60px rgba(212, 168, 75, 0.08),
                0 18px 44px rgba(0, 0, 0, 0.50);
        }

        .awen-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background:
                linear-gradient(120deg, rgba(141, 184, 196, 0.06), rgba(236, 195, 111, 0.04) 40%, transparent 70%);
            mix-blend-mode: screen;
            opacity: 0.7;
        }

        #canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 78vh;
            aspect-ratio: 16 / 9;
            image-rendering: auto;
            outline: none;
        }

        .awen-progress-wrap {
            margin: 0;
            width: min(520px, 100%);
            justify-self: center;
            display: grid;
            gap: 6px;
        }

        progress {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            appearance: none;
            border: 1px solid rgba(212, 168, 75, 0.30);
            background: rgba(11, 10, 16, 0.6);
        }

        progress::-webkit-progress-bar {
            background: rgba(11, 10, 16, 0.6);
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, var(--fog), var(--mist) 40%, var(--gold));
        }

        progress::-moz-progress-bar {
            background: linear-gradient(90deg, var(--fog), var(--mist) 40%, var(--gold));
        }

        .awen-note {
            margin: 0;
            color: var(--mist);
            font-size: 0.84rem;
            text-align: center;
        }

        .is-error {
            color: var(--danger);
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .awen-topbar {
                padding: 12px;
            }

            #canvas {
                max-height: 62vh;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="awen-app">
        <header class="awen-topbar">
            <div>
                <h1 class="awen-title">Awen</h1>
                <p class="awen-subtitle">Echo - Pong</p>
            </div>
            <div id="status" class="awen-status">Initializing...</div>
        </header>

        <section class="awen-stage" aria-label="Awen Game Canvas">
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        </section>

        <div class="awen-progress-wrap" id="progress-wrap">
            <progress id="progress" max="100" value="0"></progress>
            <p class="awen-note">Tip: Press SPACE to toggle AI for player 2.</p>
        </div>
    </div>

    <script>
        // Patch getContext so WebGL is created with premultipliedAlpha disabled.
        // This lets ClearBackground with alpha < 255 produce correct transparency
        // when composited over the page background.
        (function () {
            var origGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function (type, attrs) {
                if (type === "webgl" || type === "webgl2") {
                    attrs = Object.assign({}, attrs, { premultipliedAlpha: false });
                }
                return origGetContext.call(this, type, attrs);
            };
        })();

        var statusElement = document.getElementById("status");
        var progressElement = document.getElementById("progress");
        var progressWrapElement = document.getElementById("progress-wrap");

        var Module = {
            preRun: [],
            postRun: [function () {
                if (progressWrapElement) {
                    progressWrapElement.style.display = "none";
                }
            }],
            canvas: (function () {
                var canvas = document.getElementById("canvas");
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert("WebGL context lost. Reload the page.");
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function (text) {
                if (!statusElement) {
                    return;
                }

                var message = text || "";
                statusElement.textContent = message;

                var match = message.match(/\((\d+(?:\.\d+)?)\/(\d+)\)/);
                if (!match || !progressElement) {
                    return;
                }

                var current = Number(match[1]);
                var total = Number(match[2]);
                if (total > 0) {
                    progressElement.value = Math.floor((current / total) * 100);
                }
            },
            monitorRunDependencies: function (left) {
                this.totalDependencies = Math.max(this.totalDependencies || 0, left);
                if (left) {
                    this.setStatus("Loading engine assets (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")");
                } else {
                    this.setStatus("Ready.");
                    if (progressElement) {
                        progressElement.value = 100;
                    }
                }
            }
        };

        window.onerror = function (event) {
            if (!statusElement) {
                return;
            }

            statusElement.classList.add("is-error");
            statusElement.textContent = "Runtime error. Check browser console.";
        };
    </script>

    {{{ SCRIPT }}}
</body>

</html>
